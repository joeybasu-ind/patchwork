<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0e0f0d"/>

  <!-- Subtle gradient blobs -->
  <radialGradient id="g1" cx="25%" cy="40%" r="40%">
    <stop offset="0%" stop-color="#c2692a" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#c2692a" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="g2" cx="80%" cy="70%" r="35%">
    <stop offset="0%" stop-color="#8b3a1a" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#8b3a1a" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Logo mark — centered, large -->
  <g transform="translate(516, 170)">
    <rect width="168" height="168" rx="28" fill="url(#logoGrad)"/>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2692a"/>
      <stop offset="100%" stop-color="#8b3a1a"/>
    </linearGradient>
    <!-- 2x2 grid of squares -->
    <rect x="18" y="18" width="60" height="60" rx="8" fill="white" opacity="0.95"/>
    <rect x="90" y="18" width="60" height="60" rx="8" fill="white" opacity="0.6"/>
    <rect x="18" y="90" width="60" height="60" rx="8" fill="white" opacity="0.6"/>
    <rect x="90" y="90" width="60" height="60" rx="8" fill="white" opacity="0.85"/>
  </g>

  <!-- Wordmark -->
  <text
    x="600" y="410"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="88"
    font-weight="800"
    letter-spacing="-2"
    fill="white"
  >Patch<tspan fill="#e8925a">work</tspan></text>

  <!-- Tagline -->
  <text
    x="600" y="478"
    text-anchor="middle"
    font-family="Inter, Helvetica Neue, sans-serif"
    font-size="28"
    font-weight="400"
    fill="#7c8499"
    letter-spacing="1"
  >Indiana Commercial Real Estate Intelligence</text>

  <!-- Bottom domain -->
  <text
    x="600" y="570"
    text-anchor="middle"
    font-family="Inter, Helvetica Neue, sans-serif"
    font-size="22"
    font-weight="600"
    fill="#c2692a"
    letter-spacing="0.5"
  >yourpatchwork.com</text>
</svg>
